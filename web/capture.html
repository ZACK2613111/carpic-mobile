<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Photos du véhicule — CarStudio</title>
    <style>
      :root {
        /* Light "White & Light" brand — mirrors the app's theme.ts */
        --bg: #ffffff; --surface: #f6f7f9; --surface-alt: #eef0f4; --border: #e4e7ee;
        --text: #14151a; --muted: #5b6070; --primary: #3e63dd; --ok: #12a150; --err: #e5484d;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; background: var(--bg); color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .wrap { max-width: 560px; margin: 0 auto; padding: 16px 16px 48px; }
      .brand { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
        color: var(--primary); margin: 6px 2px 8px; }
      h1 { font-size: 22px; font-weight: 800; margin: 0 2px 6px; }
      .sub { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 0 2px 14px; }
      .loading, .err { text-align: center; color: var(--muted); padding: 64px 16px; line-height: 1.6; }
      .err b { color: var(--err); }

      .progressCard { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
        padding: 14px; margin-bottom: 18px; position: sticky; top: 8px; z-index: 5;
        box-shadow: 0 2px 8px rgba(26,35,64,.06); }
      .progressTop { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
      .progressTop span:last-child { color: var(--muted); font-weight: 600; }
      .track { height: 8px; border-radius: 999px; background: var(--surface-alt); overflow: hidden; }
      .fill { height: 8px; border-radius: 999px; background: var(--ok); width: 0; transition: width .3s; }

      .group { font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
        color: var(--muted); margin: 20px 2px 8px; }
      .slot { display: flex; align-items: center; gap: 12px; background: var(--surface);
        border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 8px; }
      .slot .thumb { width: 54px; height: 54px; border-radius: 10px; background: var(--surface-alt);
        border: 1px solid var(--border); flex: none; display: flex; align-items: center; justify-content: center;
        font-size: 22px; overflow: hidden; }
      .slot .thumb img { width: 100%; height: 100%; object-fit: cover; }
      .slot .meta { flex: 1; min-width: 0; }
      .slot .label { font-size: 15px; font-weight: 700; }
      .slot .state { font-size: 12px; color: var(--muted); margin-top: 2px; }
      .slot .state.ok { color: var(--ok); font-weight: 700; }
      .slot .state.err { color: var(--err); font-weight: 700; }
      .slot button { flex: none; border: none; border-radius: 10px; padding: 10px 14px; font: inherit;
        font-size: 13px; font-weight: 700; cursor: pointer; background: var(--primary); color: #fff; }
      .slot button.redo { background: var(--surface-alt); color: var(--text); border: 1px solid var(--border); }
      .slot button:disabled { opacity: .55; }
      .slot input[type="file"] { display: none; }
      .doneBanner { text-align: center; background: rgba(18,161,80,.10); border: 1px solid var(--ok);
        color: var(--ok); font-weight: 700; border-radius: 14px; padding: 14px; margin-top: 18px; }
      .footer { text-align: center; color: var(--muted); font-size: 11px; padding-top: 28px; }
      .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(62,99,221,.28);
        border-top-color: var(--primary); border-radius: 50%; animation: r 1s linear infinite; vertical-align: -2px; }
      @keyframes r { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { .spin { animation-duration: 2.5s; } .fill { transition: none; } }
    </style>
  </head>
  <body>
    <div class="wrap" id="app"><div class="loading">Chargement…</div></div>

    <script>
      // --- Lightweight i18n (EN/FR/AR) --------------------------------------
      // The remote helper who shoots the photos may read Arabic or French, so
      // the page localizes its chrome. System fonts cover all three (no font
      // download on a metered link). Language: ?lang= first, else browser, else EN.
      var STRINGS = {
        en: {
          pageTitle: 'Vehicle photos — CarStudio', loading: 'Loading…',
          linkInvalid: 'Invalid or expired link', openAsSent: 'Open the link exactly as it was sent to you.',
          askNewLink: 'Ask the person who sent it for a new link.', tryAgain: 'Please try again in a moment.',
          photosTitle: 'Photos', vehicle: 'vehicle',
          intro: 'You’ve been asked to photograph this vehicle. Follow the list — each button opens your camera directly. You can close the page and come back later.',
          sent: 'Photos sent', prepare: 'Preparing…', sending: 'Sending…', sentState: 'Sent',
          retake: 'Retake', take: 'Take', alreadySent: 'Already sent', toTake: 'To take',
          uploadRefused: 'upload refused', failed: 'Failed', retrySuffix: ' — try again',
          allDone: 'All photos sent — thank you! You can close the page.',
          secure: 'Your photos are sent securely · CarStudio',
          grpExterior: 'Exterior', grpWheels: 'Wheels', grpInterior: 'Interior', grpDocs: 'Documents', grpEngine: 'Engine'
        },
        fr: {
          pageTitle: 'Photos du véhicule — CarStudio', loading: 'Chargement…',
          linkInvalid: 'Lien invalide ou expiré', openAsSent: 'Ouvrez le lien exactement tel qu’il vous a été envoyé.',
          askNewLink: 'Demandez un nouveau lien à la personne qui vous l’a envoyé.', tryAgain: 'Réessayez dans un instant.',
          photosTitle: 'Photos', vehicle: 'véhicule',
          intro: 'On vous a demandé de photographier ce véhicule. Suivez la liste — chaque bouton ouvre directement votre appareil photo. Vous pouvez fermer la page et reprendre plus tard.',
          sent: 'Photos envoyées', prepare: 'Préparation…', sending: 'Envoi…', sentState: 'Envoyée',
          retake: 'Reprendre', take: 'Prendre', alreadySent: 'Déjà envoyée', toTake: 'À prendre',
          uploadRefused: 'envoi refusé', failed: 'Échec', retrySuffix: ' — réessayez',
          allDone: 'Toutes les photos sont envoyées — merci ! Vous pouvez fermer la page.',
          secure: 'Vos photos sont transmises de façon sécurisée · CarStudio',
          grpExterior: 'Extérieur', grpWheels: 'Roues', grpInterior: 'Intérieur', grpDocs: 'Documents', grpEngine: 'Moteur'
        },
        ar: {
          pageTitle: 'صور المركبة — CarStudio', loading: 'جارٍ التحميل…',
          linkInvalid: 'الرابط غير صالح أو منتهي الصلاحية', openAsSent: 'افتح الرابط تمامًا كما أُرسل إليك.',
          askNewLink: 'اطلب رابطًا جديدًا ممن أرسله إليك.', tryAgain: 'أعد المحاولة بعد قليل.',
          photosTitle: 'صور', vehicle: 'مركبة',
          intro: 'طُلب منك تصوير هذه المركبة. اتبع القائمة — كل زر يفتح الكاميرا مباشرة. يمكنك إغلاق الصفحة والمتابعة لاحقًا.',
          sent: 'الصور المُرسَلة', prepare: 'جارٍ التحضير…', sending: 'جارٍ الإرسال…', sentState: 'أُرسلت',
          retake: 'إعادة', take: 'التقاط', alreadySent: 'أُرسلت مسبقًا', toTake: 'للالتقاط',
          uploadRefused: 'رُفض الإرسال', failed: 'فشل', retrySuffix: ' — أعد المحاولة',
          allDone: 'تم إرسال جميع الصور — شكرًا! يمكنك إغلاق الصفحة.',
          secure: 'تُرسَل صورك بأمان · CarStudio',
          grpExterior: 'الخارجية', grpWheels: 'العجلات', grpInterior: 'الداخلية', grpDocs: 'الوثائق', grpEngine: 'المحرك'
        }
      };
      var qs = new URLSearchParams(location.search);
      function pickLang() {
        var cand = String(qs.get('lang') || navigator.language || 'en').toLowerCase();
        if (cand.indexOf('ar') === 0) return 'ar';
        if (cand.indexOf('fr') === 0) return 'fr';
        return 'en';
      }
      var LANG = pickLang();
      var TT = STRINGS[LANG] || STRINGS.en;
      function t(k) { return TT[k] != null ? TT[k] : (STRINGS.en[k] != null ? STRINGS.en[k] : k); }
      document.documentElement.setAttribute('lang', LANG);
      if (LANG === 'ar') document.documentElement.setAttribute('dir', 'rtl');
      document.title = t('pageTitle');

      // Localized slot label: prefer the reader's language, fall back gracefully
      // (the manifest carries labelFr + label today; labelAr is optional).
      function slotLabel(s) {
        if (LANG === 'ar') return s.labelAr || s.labelFr || s.label;
        if (LANG === 'en') return s.label || s.labelFr;
        return s.labelFr || s.label;
      }

      var TOKEN = qs.get('t');
      var FNS = qs.get('e'); // Edge Functions base URL, provided by the app link
      var GROUPS = { exterior: t('grpExterior'), wheels: t('grpWheels'), interior: t('grpInterior'), docs: t('grpDocs'), engine: t('grpEngine') };
      var GROUP_ORDER = ['exterior', 'wheels', 'interior', 'docs', 'engine'];
      // Same data rule as the app: photos are resized before upload.
      var MAX_DIM = 2000;
      var JPEG_Q = 0.85;

      var app = document.getElementById('app');
      var slots = [];
      var doneCount = 0;

      function el(tag, cls, text) {
        var e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text != null) e.textContent = text; // never innerHTML for remote strings
        return e;
      }

      function fail(msg) {
        app.innerHTML = '';
        var d = el('div', 'err');
        d.appendChild(el('b', null, t('linkInvalid')));
        d.appendChild(document.createElement('br'));
        d.appendChild(document.createTextNode(msg));
        app.appendChild(d);
      }

      // Downscale on-device so a 12 MP photo doesn't burn the owner's data plan.
      function resizeToJpeg(file) {
        return new Promise(function (resolve, reject) {
          var url = URL.createObjectURL(file);
          var img = new Image();
          img.onload = function () {
            try {
              var w = img.naturalWidth, h = img.naturalHeight;
              var k = Math.min(1, MAX_DIM / Math.max(w, h));
              var cw = Math.round(w * k), ch = Math.round(h * k);
              var c = document.createElement('canvas');
              c.width = cw; c.height = ch;
              c.getContext('2d').drawImage(img, 0, 0, cw, ch);
              URL.revokeObjectURL(url);
              c.toBlob(function (b) { b ? resolve(b) : reject(new Error('resize failed')); }, 'image/jpeg', JPEG_Q);
            } catch (e) { reject(e); }
          };
          img.onerror = function () { URL.revokeObjectURL(url); reject(new Error('unreadable image')); };
          img.src = url;
        });
      }

      function updateProgress() {
        var fill = document.getElementById('fill');
        var count = document.getElementById('count');
        if (fill) fill.style.width = Math.round((doneCount / slots.length) * 100) + '%';
        if (count) count.textContent = doneCount + ' / ' + slots.length;
        var banner = document.getElementById('doneBanner');
        if (banner) banner.style.display = doneCount === slots.length ? 'block' : 'none';
      }

      function setState(row, cls, text, withSpinner) {
        var st = row.querySelector('.state');
        st.className = 'state' + (cls ? ' ' + cls : '');
        st.textContent = '';
        if (withSpinner) { st.appendChild(el('span', 'spin')); st.appendChild(document.createTextNode(' ')); }
        st.appendChild(document.createTextNode(text));
      }

      function upload(slot, row, file) {
        var btn = row.querySelector('button');
        btn.disabled = true;
        setState(row, null, t('prepare'), true);
        resizeToJpeg(file)
          .then(function (blob) {
            setState(row, null, t('sending'), true);
            return fetch(FNS + '/capture-upload?t=' + encodeURIComponent(TOKEN) + '&slot=' + encodeURIComponent(slot.id), {
              method: 'POST',
              headers: { 'content-type': 'image/jpeg' },
              body: blob,
            }).then(function (r) {
              if (!r.ok) return r.json().catch(function () { return {}; }).then(function (j) {
                throw new Error(j.error || (t('uploadRefused') + ' (' + r.status + ')'));
              });
            });
          })
          .then(function () {
            if (!slot.done) { slot.done = true; doneCount++; }
            var thumb = row.querySelector('.thumb');
            thumb.textContent = '';
            var im = document.createElement('img');
            im.src = URL.createObjectURL(file);
            thumb.appendChild(im);
            setState(row, 'ok', t('sentState'));
            btn.textContent = t('retake');
            btn.className = 'redo';
            btn.disabled = false;
            updateProgress();
          })
          .catch(function (e) {
            setState(row, 'err', (e && e.message ? e.message : t('failed')) + t('retrySuffix'));
            btn.disabled = false;
          });
      }

      function slotRow(slot) {
        var row = el('div', 'slot');
        var thumb = el('div', 'thumb');
        row.appendChild(thumb);
        var meta = el('div', 'meta');
        meta.appendChild(el('div', 'label', slotLabel(slot)));
        meta.appendChild(el('div', 'state' + (slot.done ? ' ok' : ''), slot.done ? t('alreadySent') : t('toTake')));
        row.appendChild(meta);

        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.setAttribute('capture', 'environment');
        var btn = el('button', slot.done ? 'redo' : '', slot.done ? t('retake') : t('take'));
        btn.onclick = function () { input.click(); };
        input.onchange = function () {
          if (input.files && input.files[0]) upload(slot, row, input.files[0]);
          input.value = '';
        };
        row.appendChild(btn);
        row.appendChild(input);
        return row;
      }

      function render(manifest) {
        slots = manifest.slots || [];
        doneCount = slots.filter(function (s) { return s.done; }).length;
        app.innerHTML = '';
        app.appendChild(el('div', 'brand', 'CarStudio'));
        app.appendChild(el('h1', null, t('photosTitle') + ' — ' + (manifest.name || t('vehicle'))));
        app.appendChild(el('p', 'sub', t('intro')));

        var card = el('div', 'progressCard');
        var top = el('div', 'progressTop');
        top.appendChild(el('span', null, t('sent')));
        var count = el('span'); count.id = 'count';
        top.appendChild(count);
        card.appendChild(top);
        var track = el('div', 'track');
        var fill = el('div', 'fill'); fill.id = 'fill';
        track.appendChild(fill);
        card.appendChild(track);
        app.appendChild(card);

        GROUP_ORDER.forEach(function (g) {
          var list = slots.filter(function (s) { return s.section === g; });
          if (!list.length) return;
          app.appendChild(el('div', 'group', GROUPS[g] || g));
          list.forEach(function (s) { app.appendChild(slotRow(s)); });
        });

        var banner = el('div', 'doneBanner', t('allDone'));
        banner.id = 'doneBanner';
        banner.style.display = 'none';
        app.appendChild(banner);

        app.appendChild(el('div', 'footer', t('secure')));
        updateProgress();
      }

      (function () {
        var loadingEl = app.querySelector('.loading');
        if (loadingEl) loadingEl.textContent = t('loading');
        if (!TOKEN || !FNS) { fail(t('openAsSent')); return; }
        fetch(FNS + '/capture-manifest?t=' + encodeURIComponent(TOKEN))
          .then(function (r) {
            if (!r.ok) throw new Error(t('askNewLink'));
            return r.json();
          })
          .then(render)
          .catch(function (e) { fail(e && e.message ? e.message : t('tryAgain')); });
      })();
    </script>
  </body>
</html>
