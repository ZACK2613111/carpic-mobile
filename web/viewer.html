<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>CarStudio</title>
    <style>
      :root {
        /* Light "White & Light" brand — mirrors the app's theme.ts */
        --bg: #ffffff; --surface: #f6f7f9; --surfaceAlt: #eef0f4; --border: #e4e7ee;
        --text: #14151a; --muted: #5b6070; --primary: #3e63dd;
        --ins-high: #e5484d; --ins-medium: #e08600; --ins-low: #e0a400;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; background: var(--bg); color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .wrap { max-width: 780px; margin: 0 auto; padding: 16px; }
      .title { font-size: 24px; font-weight: 800; margin: 8px 4px 4px; }
      .vehicle { color: var(--muted); font-size: 14px; font-weight: 600; margin: 0 4px 16px; }
      .loading, .err { text-align: center; color: var(--muted); padding: 64px 16px; }
      .section-label { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .5px;
        text-transform: uppercase; margin: 22px 4px 10px; }
      /* condition report */
      .condition { display: flex; flex-direction: column; gap: 8px; }
      .cond-item { display: flex; align-items: flex-start; gap: 10px; background: var(--surface);
        border: 1px solid var(--border); border-radius: 12px; padding: 11px 12px; }
      .cond-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex: none; }
      .cond-body { flex: 1; min-width: 0; }
      .cond-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
      .cond-title { font-size: 14px; font-weight: 700; }
      .cond-area { font-size: 12px; color: var(--muted); }
      .cond-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }
      .sevpill { flex: none; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
      .sevpill.sev-high { background: rgba(229,72,77,.12); color: var(--ins-high); }
      .sevpill.sev-medium { background: rgba(224,134,0,.12); color: var(--ins-medium); }
      .sevpill.sev-low { background: rgba(224,164,0,.14); color: var(--ins-low); }

      /* stage (360 + lightbox share this) */
      .stage { position: relative; width: 100%; aspect-ratio: 4/3; border-radius: 16px; overflow: hidden;
        border: 1px solid var(--border); background: var(--surfaceAlt); touch-action: pan-y; user-select: none; }
      .stage img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
      .stage .bg { position: absolute; inset: 0; }
      /* synthetic ground shadow under the car (matches the app's Skia shadow) */
      .gshadow { position: absolute; left: 50%; top: 84%; transform: translate(-50%, -50%);
        width: 68%; height: 7%; border-radius: 50%; background: #000; filter: blur(16px); pointer-events: none; }
      /* license-plate mask (blur or branded fill, mirrors the app's Skia render) */
      .plate { position: absolute; border-radius: 6px; pointer-events: none; }
      .plate.pblur { backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px);
        background: rgba(125,125,135,.28); }
      /* seller watermark (mirrors the app's Skia stamp) */
      .wm { position: absolute; bottom: 4%; max-width: 92%; background: rgba(0,0,0,.42); color: #fff;
        font-size: 13px; font-weight: 700; padding: 5px 10px; border-radius: 999px; pointer-events: none;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .wm.wleft { left: 4%; } .wm.wright { right: 4%; }
      .wm.wcenter { left: 50%; transform: translateX(-50%); }
      .hint { position: absolute; left: 50%; bottom: 10px; transform: translateX(-50%);
        background: rgba(0,0,0,.5); color: #fff; font-size: 12px; padding: 5px 12px; border-radius: 999px; }
      .badge360 { position: absolute; top: 10px; left: 10px; background: var(--primary); color: #fff;
        font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }

      /* hotspot pins */
      .pin { position: absolute; width: 26px; height: 26px; margin: -13px 0 0 -13px; border-radius: 50%;
        border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
      .pin.has-photo::after { content: ''; position: absolute; top: -3px; right: -3px; width: 11px; height: 11px;
        border-radius: 50%; background: #fff; border: 2px solid rgba(17,18,26,.28); box-sizing: border-box; }
      .pop { position: absolute; z-index: 5; max-width: 220px; background: var(--surface); border: 1px solid var(--border);
        border-radius: 12px; padding: 10px 12px; transform: translate(-50%, calc(-100% - 16px)); box-shadow: 0 8px 24px rgba(26,35,64,.18); }
      .pop h4 { margin: 0 0 4px; font-size: 14px; }
      .pop p { margin: 0; font-size: 13px; color: var(--muted); }
      .pop .sev { font-size: 11px; font-weight: 700; }
      .pop img { width: 100%; border-radius: 8px; margin-top: 8px; display: block; }
      .cond-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex: none; }

      /* gallery */
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .card { cursor: pointer; }
      .card .thumb { width: 100%; aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
        background: var(--surfaceAlt); display: flex; align-items: center; justify-content: center; position: relative; }
      .card .thumb img { width: 100%; height: 100%; object-fit: cover; }
      .card .cap { font-size: 12px; color: var(--muted); margin-top: 5px; text-align: center;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .dotcount { position: absolute; top: 6px; right: 6px; background: var(--primary); color: #fff;
        font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; }

      /* lightbox */
      .lb { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; flex-direction: column;
        z-index: 20; padding: 16px; }
      .lb.open { display: flex; }
      .lb .close { align-self: flex-end; background: var(--surface); border: 1px solid var(--border); color: var(--text);
        width: 40px; height: 40px; border-radius: 12px; font-size: 20px; cursor: pointer; }
      .lb .stage { flex: 1; margin: 12px 0; aspect-ratio: auto; }
      .lb .lbtitle { color: #fff; font-weight: 700; }
      audio { width: 100%; margin-top: 12px; }
      .footer { text-align: center; color: var(--muted); font-size: 11px; padding: 28px 0 12px; }
    </style>
  </head>
  <body>
    <div class="wrap"><div id="app"><div class="loading">Loading…</div></div></div>
    <div class="lb" id="lb"><button class="close" id="lbClose">×</button></div>

    <script>
      var BG = {
        transparent: 'repeating-conic-gradient(#ffffff 0 25%, #e6e9f0 0 50%) 0 0 / 28px 28px',
        white: '#ffffff', silver: '#d7dbe0', black: '#0b0b0f',
        'grad-ocean': 'linear-gradient(#1e3c72,#2a5298)',
        'grad-sunset': 'linear-gradient(#f7971e,#ffd200)',
        'grad-graphite': 'linear-gradient(#232526,#414345)',
        'studio-graphite': 'linear-gradient(#3a3f47,#0f1114)',
        'studio-showroom': 'linear-gradient(#e9edf2,#c3ccd6)',
        'studio-blue': 'linear-gradient(#1b2a4a,#0a1122)'
      };
      function bgFor(id) { return BG[id] || 'var(--surfaceAlt)'; }

      // Ground color per background (its bottom-most tone) — drives shadow strength,
      // mirroring the app's shadowStyleFor(): light floor = stronger shadow.
      var GROUND = {
        white: '#ffffff', silver: '#d7dbe0', black: '#0b0b0f',
        'grad-ocean': '#2a5298', 'grad-sunset': '#ffd200', 'grad-graphite': '#414345',
        'studio-graphite': '#0f1114', 'studio-showroom': '#c3ccd6', 'studio-blue': '#0a1122'
      };
      function shadowOn(cutout, bgId, override) {
        if (!cutout) return false;
        return override != null ? override : bgId !== 'transparent';
      }
      function shadowOpacity(bgId) {
        var hex = GROUND[bgId] || '#808080';
        var r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
        var lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        return 0.12 + lum * 0.22;
      }
      function addShadow(stage, bgId) {
        var s = el('div', 'gshadow');
        s.style.opacity = String(shadowOpacity(bgId));
        stage.appendChild(s);
      }
      // Manifest-level seller watermark, stamped on every stage (textContent, no HTML).
      var WATERMARK = null;
      function addWatermark(stage) {
        if (!WATERMARK || !WATERMARK.text) return;
        var pos = WATERMARK.position === 'bottom-left' ? 'wleft'
          : WATERMARK.position === 'bottom-center' ? 'wcenter' : 'wright';
        stage.appendChild(el('div', 'wm ' + pos, WATERMARK.text));
      }
      function pinColor(h) {
        if (h.kind === 'marketing') return '#3e63dd';
        return h.severity === 'high' ? '#e5484d' : h.severity === 'low' ? '#e0a400' : '#e08600';
      }
      // Uses textContent (never innerHTML) so manifest strings can't inject markup/scripts.
      function el(tag, cls, text) { var e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; }

      // Renders hotspot pins into a stage element for a given set of hotspots.
      function renderPins(stage, hotspots) {
        (hotspots || []).forEach(function (h, i) {
          var pin = el('div', 'pin' + (h.photoUrl ? ' has-photo' : ''));
          pin.style.left = (h.x * 100) + '%';
          pin.style.top = (h.y * 100) + '%';
          pin.style.background = pinColor(h);
          pin.textContent = String(i + 1);
          pin.onclick = function (ev) {
            ev.stopPropagation();
            var existing = stage.querySelector('.pop');
            if (existing) existing.remove();
            var pop = el('div', 'pop');
            pop.style.left = (h.x * 100) + '%';
            pop.style.top = (h.y * 100) + '%';
            if (h.kind === 'inspection' && h.severity) {
              var sevEl = el('div', 'sev', String(h.severity).toUpperCase());
              sevEl.style.color = pinColor(h);
              pop.appendChild(sevEl);
            }
            pop.appendChild(el('h4', null, h.title || ''));
            if (h.description) pop.appendChild(el('p', null, h.description));
            if (h.photoUrl) { var pim = el('img'); pim.src = h.photoUrl; pim.loading = 'lazy'; pop.appendChild(pim); }
            stage.appendChild(pop);
          };
          stage.appendChild(pin);
        });
        stage.onclick = function () { var p = stage.querySelector('.pop'); if (p) p.remove(); };
      }

      // Drag-to-rotate 360 stage.
      function build360(spin) {
        var stage = el('div', 'stage');
        var bg = el('div', 'bg');
        bg.style.background = spin.hasCutout ? bgFor(spin.backgroundId) : 'transparent';
        stage.appendChild(bg);
        if (shadowOn(spin.hasCutout, spin.backgroundId, spin.shadow)) addShadow(stage, spin.backgroundId);
        var img = el('img');
        stage.appendChild(img);
        stage.appendChild(el('div', 'badge360', '360°'));
        addWatermark(stage);
        var hintEl = el('div', 'hint', '↔ Drag to rotate');
        stage.appendChild(hintEl);

        var n = spin.frames.length, index = 0, startX = 0, startIndex = 0, dragging = false;
        function show(i) {
          index = ((i % n) + n) % n;
          if (spin.frames[index]) img.src = spin.frames[index];
          Array.prototype.slice.call(stage.querySelectorAll('.pin,.pop')).forEach(function (p) { p.remove(); });
          renderPins(stage, (spin.hotspots || []).filter(function (h) { return h.frame === index; }));
          hintEl.textContent = '↔ ' + (index + 1) + ' / ' + n;
        }
        // Preload progressively, one frame at a time: an eager burst of all
        // frames stalls first paint and eats the viewer's mobile data quota.
        (function preload(i) {
          if (i >= n) return;
          var u = spin.frames[i];
          if (!u) { preload(i + 1); return; }
          var im = new Image();
          im.onload = im.onerror = function () { preload(i + 1); };
          im.src = u;
        })(1);
        function onDown(x) { dragging = true; startX = x; startIndex = index; }
        function onMove(x) { if (!dragging) return; var step = stage.clientWidth / n; show(startIndex - Math.round((x - startX) / step)); }
        function onUp() { dragging = false; }
        stage.addEventListener('mousedown', function (e) { onDown(e.clientX); });
        window.addEventListener('mousemove', function (e) { onMove(e.clientX); });
        window.addEventListener('mouseup', onUp);
        stage.addEventListener('touchstart', function (e) { onDown(e.touches[0].clientX); }, { passive: true });
        stage.addEventListener('touchmove', function (e) { onMove(e.touches[0].clientX); }, { passive: true });
        stage.addEventListener('touchend', onUp);
        show(0);
        return stage;
      }

      function openLightbox(shot) {
        var lb = document.getElementById('lb');
        Array.prototype.slice.call(lb.querySelectorAll('.stage,.lbtitle,audio')).forEach(function (n) { n.remove(); });
        lb.appendChild(el('div', 'lbtitle', shot.label || ''));
        var stage = el('div', 'stage');
        var bg = el('div', 'bg');
        bg.style.background = shot.cutout ? bgFor(shot.backgroundId) : 'transparent';
        stage.appendChild(bg);
        if (shadowOn(shot.cutout, shot.backgroundId, shot.shadow)) addShadow(stage, shot.backgroundId);
        var img = el('img'); img.src = shot.url; stage.appendChild(img);
        if (shot.plate) {
          var pl = el('div', shot.plate.style === 'brand' ? 'plate' : 'plate pblur');
          pl.style.left = (shot.plate.x * 100) + '%';
          pl.style.top = (shot.plate.y * 100) + '%';
          pl.style.width = (shot.plate.w * 100) + '%';
          pl.style.height = (shot.plate.h * 100) + '%';
          if (shot.plate.style === 'brand') pl.style.background = shot.plate.color || '#14161a';
          stage.appendChild(pl);
        }
        addWatermark(stage);
        renderPins(stage, shot.hotspots);
        lb.appendChild(stage);
        if (shot.audioUrl) {
          var a = document.createElement('audio'); a.controls = true; a.src = shot.audioUrl; lb.appendChild(a);
        }
        lb.classList.add('open');
      }
      document.getElementById('lbClose').onclick = function () { document.getElementById('lb').classList.remove('open'); };

      var SEV_LABEL = { high: 'Major', medium: 'Moderate', low: 'Minor' };
      var SEV_RANK = { high: 3, medium: 2, low: 1 };
      // Aggregate inspection pins across shots + 360 into a buyer-facing report.
      function buildCondition(m) {
        var items = [];
        (m.shots || []).forEach(function (s) {
          (s.hotspots || []).forEach(function (h) {
            if (h.kind === 'inspection') items.push({ area: s.label || '', h: h });
          });
        });
        if (m.spin && m.spin.hotspots) {
          m.spin.hotspots.forEach(function (h) {
            if (h.kind === 'inspection') items.push({ area: '360°', h: h });
          });
        }
        if (!items.length) return null;
        items.sort(function (a, b) { return (SEV_RANK[b.h.severity] || 2) - (SEV_RANK[a.h.severity] || 2); });

        var wrap = document.createElement('div');
        wrap.appendChild(el('div', 'section-label', 'Condition · ' + items.length + ' point' + (items.length === 1 ? '' : 's')));
        var list = el('div', 'condition');
        items.forEach(function (it) {
          var sev = it.h.severity || 'medium';
          var row = el('div', 'cond-item');
          var dot = el('span', 'cond-dot'); dot.style.background = pinColor(it.h); row.appendChild(dot);
          if (it.h.photoUrl) { var cth = el('img', 'cond-thumb'); cth.src = it.h.photoUrl; cth.loading = 'lazy'; row.appendChild(cth); }
          var body = el('div', 'cond-body');
          var head = el('div', 'cond-head');
          head.appendChild(el('span', 'cond-title', it.h.title || 'Point'));
          if (it.area) head.appendChild(el('span', 'cond-area', it.area));
          body.appendChild(head);
          if (it.h.description) body.appendChild(el('div', 'cond-desc', it.h.description));
          row.appendChild(body);
          row.appendChild(el('span', 'sevpill sev-' + sev, SEV_LABEL[sev] || 'Moderate'));
          list.appendChild(row);
        });
        wrap.appendChild(list);
        return wrap;
      }

      // Marketing pins → a buyer-facing highlights list (the positive twin of
      // the condition report). Computed client-side from the manifest.
      function buildHighlights(m) {
        var items = [];
        (m.shots || []).forEach(function (s) {
          (s.hotspots || []).forEach(function (h) {
            if (h.kind === 'marketing') items.push({ area: s.label || '', h: h });
          });
        });
        if (m.spin && m.spin.hotspots) {
          m.spin.hotspots.forEach(function (h) {
            if (h.kind === 'marketing') items.push({ area: '360°', h: h });
          });
        }
        if (!items.length) return null;
        var wrap = document.createElement('div');
        wrap.appendChild(el('div', 'section-label', 'Highlights · ' + items.length));
        var list = el('div', 'condition');
        items.forEach(function (it) {
          var row = el('div', 'cond-item');
          var dot = el('span', 'cond-dot'); dot.style.background = '#3e63dd'; row.appendChild(dot);
          if (it.h.photoUrl) { var hth = el('img', 'cond-thumb'); hth.src = it.h.photoUrl; hth.loading = 'lazy'; row.appendChild(hth); }
          var body = el('div', 'cond-body');
          var head = el('div', 'cond-head');
          head.appendChild(el('span', 'cond-title', it.h.title || 'Feature'));
          if (it.area) head.appendChild(el('span', 'cond-area', it.area));
          body.appendChild(head);
          if (it.h.description) body.appendChild(el('div', 'cond-desc', it.h.description));
          row.appendChild(body);
          list.appendChild(row);
        });
        wrap.appendChild(list);
        return wrap;
      }

      function render(m) {
        WATERMARK = m.watermark || null;
        var app = document.getElementById('app');
        app.innerHTML = '';
        app.appendChild(el('div', 'title', m.name || 'Vehicle'));
        if (m.vehicle) app.appendChild(el('div', 'vehicle', m.vehicle));

        if (m.spin && m.spin.frameCount > 0 && m.spin.frames && m.spin.frames.length) {
          app.appendChild(build360(m.spin));
        }

        var highlights = buildHighlights(m);
        if (highlights) app.appendChild(highlights);

        var condition = buildCondition(m);
        if (condition) app.appendChild(condition);

        // group shots by section
        var groups = {};
        (m.shots || []).forEach(function (s) { (groups[s.section] = groups[s.section] || []).push(s); });
        var order = ['exterior', 'wheels', 'interior', 'docs', 'engine'];
        var labels = { exterior: 'Exterior', wheels: 'Wheels', interior: 'Interior', docs: 'Documents', engine: 'Engine' };
        order.forEach(function (g) {
          var list = groups[g]; if (!list || !list.length) return;
          app.appendChild(el('div', 'section-label', labels[g] || g));
          var grid = el('div', 'grid');
          list.forEach(function (s) {
            var card = el('div', 'card');
            var thumb = el('div', 'thumb');
            var im = el('img'); im.src = s.url; im.loading = 'lazy'; thumb.appendChild(im);
            var count = (s.hotspots || []).length;
            if (count) thumb.appendChild(el('div', 'dotcount', String(count)));
            card.appendChild(thumb);
            card.appendChild(el('div', 'cap', s.label || ''));
            card.onclick = function () { openLightbox(s); };
            grid.appendChild(card);
          });
          app.appendChild(grid);
        });

        app.appendChild(el('div', 'footer', 'Made with CarStudio'));
      }

      (function () {
        var app = document.getElementById('app');
        var d = new URLSearchParams(location.search).get('d');
        if (!d) { app.innerHTML = '<p class="err">Missing listing data.</p>'; return; }
        fetch(d)
          .then(function (r) { return r.json(); })
          .then(function (m) {
            if (!m || typeof m !== 'object') throw new Error('bad manifest');
            render(m);
          })
          .catch(function () { app.innerHTML = '<p class="err">Could not load this listing.</p>'; });
      })();
    </script>
  </body>
</html>
