name: EAS build

# Manual (Run workflow) EAS build — defaults to the free installable Android APK.
# Kept manual so it never auto-spends EAS build credits on every push.
#
# One-time setup before this works:
#   1. Create an Expo access token: expo.dev → account → Access tokens.
#   2. Add it to this repo: Settings → Secrets and variables → Actions →
#      New repository secret → name EXPO_TOKEN.
#   3. Set the app's env on EAS (EXPO_PUBLIC_SUPABASE_URL + _PUBLISHABLE_KEY)
#      via `eas env:create` or the EAS dashboard, so the build is configured.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options: [android, ios]
        default: android
      profile:
        description: EAS build profile
        type: choice
        options: [preview, production]
        default: preview

jobs:
  build:
    name: eas build ${{ inputs.platform }} (${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait
